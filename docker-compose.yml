version: '3.8'

services:
  web:
    build: ./api
    # Se sobrescribe el comando por si en el futuro se quiere cambiar (ej. para usar daphne/gunicorn)
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      # Aquí puedes añadir más variables de entorno en el futuro
